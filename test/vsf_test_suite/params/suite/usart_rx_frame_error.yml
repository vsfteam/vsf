rx_frame_error:
  name: usart_rx_frame_error
  suite_timeout_s: 5.0
  dut:
    channel: uart1_rx
    port: /dev/ttyUSB0
  payload: "Hello VSF\r\n"
  timeout_s: 1.5
  defaults:
    baudrate: 115200
    expect_pass: true
    host:
      send:
        baudrate: 115200
        parity_type: none
        num_data_bits: 8
        num_stop_bits: 1.0
    la:
      decode:
        baudrate: 115200
        parity_type: none
        num_data_bits: 8
        num_stop_bits: 1.0
  cases:
  - idx: 0
    mode:
    - VSF_USART_NO_PARITY
    - VSF_USART_2_STOPBIT
    - VSF_USART_8_BIT_LENGTH
    - VSF_USART_RX_ENABLE
    host:
      send:
        num_stop_bits: 1.0
    la:
      decode:
        num_stop_bits: 1.0
